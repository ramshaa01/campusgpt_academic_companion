name: campusgpt_academic_companion
description: "CampusGPT — AI-powered academic companion for students."
publish_to: 'none'

version: 1.1.0+2

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.1.0
  lucide_icons: ^0.257.0
  provider: ^6.1.5
  shared_preferences: ^2.5.3
  file_picker: ^10.1.9
  connectivity_plus: ^6.1.4
  http: ^1.4.0
  crypto: ^3.0.6
  uuid: ^4.5.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
